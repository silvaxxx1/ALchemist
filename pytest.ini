[pytest]
# Run from the project root: pytest tests/
# The rootdir is added to sys.path via tests/conftest.py so all
# project modules (prepare_pockets, pipeline, util/, etc.) import cleanly.

testpaths = tests

# Markers registered here suppress the PytestUnknownMarkWarning
markers =
    gpu: test requires a CUDA GPU
    integration: test requires GPU + model checkpoints (slow)

# Show short summary for all outcomes: passes, failures, skips, errors
addopts = -ra --tb=short

# Treat unregistered marks as errors (keeps the marker list tidy)
# Uncomment if you want strict marker enforcement:
# addopts = -ra --tb=short --strict-markers
